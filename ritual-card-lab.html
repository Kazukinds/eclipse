<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lab — Card de Ritual (estilo do app)</title>
<!--
  Arquivo SEPARADO e isolado. Protótipo do card de ritual no ESTILO DO INDEX
  (dark, neutros tailwind, acento por essência em OKLCH, Inter + JetBrains Mono).
  Não é importado por nada. Campos editáveis; categorias/círculo clicáveis.
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap');
  :root{
    --bg:#08080a;--panel:#0d0d10;--panel-2:#121216;--panel-3:#17171c;
    --line:rgba(255,255,255,.08);--line-2:rgba(255,255,255,.05);
    --txt:#f3f1f6;--muted:#928f9c;--faint:#5b5866;
    --acc:#fe1455;--acc2:#ff5c84;
    --card-w:400px;
  }
  *{box-sizing:border-box}
  body{margin:0;padding:42px 24px;min-height:100vh;background:
    radial-gradient(1200px 600px at 50% -10%,#15151b,transparent),var(--bg);
    color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;gap:26px}
  .lab-head{text-align:center;max-width:640px}
  .lab-head h1{font-family:'Fraunces',Georgia,serif;font-weight:500;font-size:30px;margin:0 0 6px}
  .lab-head p{font-size:13px;color:var(--muted);margin:0;line-height:1.6}
  .lab-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .lab-btn{display:inline-flex;align-items:center;gap:8px;background:var(--panel-2);color:var(--txt);border:1px solid var(--line);border-radius:11px;padding:9px 15px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
  .lab-btn:hover{border-color:#3a3a42;background:var(--panel-3)}
  .lab-btn .dot{width:9px;height:9px;border-radius:50%;background:var(--bc)}

  .wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));gap:22px;width:100%;max-width:1280px}

  /* ===== CARD ESTILO APP ===== */
  .rcard{
    --bc:var(--acc);--bc2:var(--acc2);
    position:relative;background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:18px;padding:0;overflow:hidden;isolation:isolate;
    box-shadow:0 18px 44px -20px rgba(0,0,0,.7);transition:border-color .2s,transform .2s,box-shadow .2s}
  .rcard:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--bc) 40%,var(--line));
    box-shadow:0 22px 50px -20px color-mix(in srgb,var(--bc) 60%,#000)}

  /* faixa de topo com a cor da essência */
  .rc-top{display:flex;align-items:center;gap:12px;padding:16px 18px;
    background:linear-gradient(180deg,color-mix(in srgb,var(--bc) 16%,var(--panel-2)),var(--panel-2));
    border-bottom:1px solid color-mix(in srgb,var(--bc) 22%,var(--line))}
  .rc-stamp{flex:0 0 40px;width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',Georgia,serif;font-size:17px;font-weight:600;color:var(--bc2);
    background:color-mix(in srgb,var(--bc) 18%,transparent);border:1px solid color-mix(in srgb,var(--bc) 36%,transparent)}
  .rc-top-main{flex:1;min-width:0}
  .rc-name{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:20px;line-height:1.15;color:var(--txt);
    outline:none;letter-spacing:-.01em}
  .rc-name:empty::before{content:attr(data-ph);color:var(--faint);font-weight:400}
  .rc-ess-name{margin-top:3px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--bc2)}

  .rc-body{padding:16px 18px 18px}

  /* label de seção */
  .rc-sec{display:flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--bc2);margin:0 0 9px}
  .rc-sec::before{content:"";width:3px;height:11px;border-radius:2px;background:var(--bc)}
  .rc-sec:not(:first-child){margin-top:16px}

  /* categorias (pills) */
  .rc-cats{display:flex;flex-wrap:wrap;gap:7px}
  .rc-cat{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:8px;border:1px solid var(--line);
    background:transparent;color:var(--muted);font-size:11.5px;font-weight:600;cursor:pointer;user-select:none;transition:.15s}
  .rc-cat .b{width:8px;height:8px;border-radius:2px;border:1.5px solid currentColor}
  .rc-cat:hover{color:var(--txt);border-color:#3a3a42}
  .rc-cat[data-on="1"]{background:color-mix(in srgb,var(--bc) 14%,transparent);border-color:color-mix(in srgb,var(--bc) 55%,var(--line));color:var(--bc2)}
  .rc-cat[data-on="1"] .b{background:var(--bc2);border-color:var(--bc2)}

  /* círculo / grau */
  .rc-graus{display:flex;gap:7px}
  .rc-grau{flex:0 0 auto;min-width:44px;text-align:center;padding:8px 12px;border-radius:8px;border:1px solid var(--line);
    background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;user-select:none;transition:.15s}
  .rc-grau:hover{color:var(--txt);border-color:#3a3a42}
  .rc-grau[data-on="1"]{background:color-mix(in srgb,var(--bc) 16%,transparent);border-color:var(--bc);color:var(--bc2)}

  /* grid de stats (exec/alcance/alvo/duracao/resistencia) */
  .rc-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px 14px;padding:14px;border:1px solid var(--line);border-radius:12px;background:var(--panel-2)}
  .rc-st{display:flex;flex-direction:column;gap:4px;min-width:0}
  .rc-st-k{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--bc2);opacity:.92}
  .rc-st-v{font-size:13px;font-weight:500;color:var(--txt);outline:none;border-bottom:1px solid transparent;min-height:18px}
  .rc-st-v:empty::before{content:attr(data-ph);color:var(--faint)}
  .rc-st-v:focus{border-bottom-color:var(--bc)}

  /* descrição */
  .rc-desc{margin-top:14px;font-size:13.5px;line-height:1.7;color:#cecbd6;outline:none;border-top:1px solid var(--line-2);padding-top:12px}
  .rc-desc:empty::before{content:attr(data-ph);color:var(--faint)}

  /* temas por essência (OKLCH, como no app) */
  .rcard[data-ess="carmim"]{--bc:#d11a14;--bc2:#ff6f8c}
  .rcard[data-ess="lumen"]{--bc:#e0a820;--bc2:#ffd56b}
  .rcard[data-ess="kaos"]{--bc:#b25ce0;--bc2:#cf8bff}
  .rcard[data-ess="ruina"]{--bc:#7a7060;--bc2:#c6c1d2}
  .rcard[data-ess="alba"]{--bc:#46b35f;--bc2:#8ee49f}
  .rcard[data-ess="perene"]{--bc:#2fb89a;--bc2:#d4df73}

  @media(max-width:520px){:root{--card-w:100%}body{padding:20px 12px}.rc-stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
  <div class="lab-head">
    <h1>Card de Ritual</h1>
    <p>Protótipo isolado no estilo do app (dark, acento por essência). Campos editáveis; categorias e círculo clicáveis. Nada aqui afeta o index.</p>
  </div>
  <div class="lab-controls">
    <button class="lab-btn" style="--bc:#d11a14" onclick="addCard('carmim')"><span class="dot"></span>Carmim</button>
    <button class="lab-btn" style="--bc:#e0a820" onclick="addCard('lumen')"><span class="dot"></span>Lúmen</button>
    <button class="lab-btn" style="--bc:#b25ce0" onclick="addCard('kaos')"><span class="dot"></span>Kaos</button>
    <button class="lab-btn" style="--bc:#7a7060" onclick="addCard('ruina')"><span class="dot"></span>Ruína</button>
    <button class="lab-btn" style="--bc:#46b35f" onclick="addCard('alba')"><span class="dot"></span>Alba</button>
    <button class="lab-btn" style="--bc:#2fb89a" onclick="addCard('perene')"><span class="dot"></span>Perene</button>
  </div>
  <div class="wrap" id="wrap"></div>

<script>
const CATS=['Conhecimento','Energia','Morte','Sangue','Medo'];
const GRAUS=['1º','2º','3º','4º'];
const ESS_NOME={carmim:'Carmim',lumen:'Lúmen',kaos:'Kaos',ruina:'Ruína',alba:'Alba',perene:'Perene'};
function cardHTML(ess,d){
  d=d||{};
  const cats=CATS.map(c=>`<span class="rc-cat" data-on="${(d.cats||[]).includes(c)?'1':'0'}" onclick="this.dataset.on=this.dataset.on==='1'?'0':'1'"><span class="b"></span>${c}</span>`).join('');
  const graus=GRAUS.map((g,i)=>`<span class="rc-grau" data-on="${d.grau===i+1?'1':'0'}" onclick="[...this.parentElement.children].forEach(x=>x.dataset.on='0');this.dataset.on='1'">${g}</span>`).join('');
  const st=(k,v,ph)=>`<div class="rc-st"><span class="rc-st-k">${k}</span><span class="rc-st-v" contenteditable data-ph="${ph||'—'}">${v||''}</span></div>`;
  return `<div class="rcard" data-ess="${ess}">
    <div class="rc-top">
      <div class="rc-stamp">${(d.grau||1)}º</div>
      <div class="rc-top-main">
        <div class="rc-name" contenteditable data-ph="Nome do ritual...">${d.name||''}</div>
        <div class="rc-ess-name">${ESS_NOME[ess]||ess}</div>
      </div>
    </div>
    <div class="rc-body">
      <div class="rc-sec">Categoria</div>
      <div class="rc-cats">${cats}</div>
      <div class="rc-sec">Círculo</div>
      <div class="rc-graus">${graus}</div>
      <div class="rc-sec">Mecânica</div>
      <div class="rc-stats">
        ${st('Execução',d.exec||'Ação Padrão')}
        ${st('Alcance',d.alc||'Pessoal')}
        ${st('Alvo',d.alvo,'—')}
        ${st('Duração',d.dur,'—')}
        ${st('Resistência',d.res,'—')}
      </div>
      <div class="rc-desc" contenteditable data-ph="Descrição / efeito do ritual...">${d.desc||''}</div>
    </div>
  </div>`;
}
function addCard(ess,d){document.getElementById('wrap').insertAdjacentHTML('beforeend',cardHTML(ess,d));}
addCard('carmim',{name:'Couraça Hemática',cats:['Sangue'],grau:1,exec:'Decisiva',alc:'Pessoal',alvo:'Você',dur:'Cena',res:'—',desc:'Você abre um corte raso e o sangue endurece numa carapaça viva. +2 em Defesa.'});
addCard('kaos',{name:'Bomba de Magma',cats:['Energia'],grau:1,exec:'Decisiva',alc:'Curto',alvo:'1 Ser',dur:'Instantânea',res:'Reflexos anula',desc:'Modela uma bomba de magma e a arremessa: 2d6 de Fogo.'});
addCard('lumen',{name:'Eco Aterrorizante',cats:['Conhecimento','Medo'],grau:1,exec:'Decisiva',alc:'Toque',alvo:'1 Ser',dur:'Instantânea',res:'Vontade anula',desc:'Deixa escorrer um eco do Outro Lado: apavorado por 1 rodada.'});
</script>
</body>
</html>

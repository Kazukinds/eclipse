<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>Iniciativa</title>
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../icons/icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#09090b;color:#f0f0f5;font-family:'Inter',system-ui,sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));gap:12px}
h1{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a0a0b0;display:flex;align-items:center;gap:8px}
.ico{width:22px;height:22px;border-radius:7px;background:rgba(248,113,113,.12);color:#f87171;display:flex;align-items:center;justify-content:center}
.ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.add{margin-left:auto;width:28px;height:28px;background:#18181c;border:1px solid #2a2a32;border-radius:8px;color:#a0a0b0;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.add:active{transform:scale(.92);color:#f87171;border-color:#f87171}
.add svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2}
ol{list-style:none;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:4px 0}
ol:empty::before{content:"Sem combatentes";display:flex;align-items:center;justify-content:center;color:#5a5a6e;font-size:12px;padding:40px;font-style:italic;height:100%}
li{display:flex;align-items:center;gap:8px;padding:12px;background:#131316;border:1px solid #2a2a32;border-radius:10px;transition:all .15s}
li.active{border-color:#f87171;background:rgba(248,113,113,.08);box-shadow:0 0 0 1px rgba(248,113,113,.3)}
li.active::before{content:"▶";color:#f87171;font-size:11px;margin-right:-2px}
.roll{width:46px;background:#18181c;border:1px solid #2a2a32;border-radius:6px;color:#fbbf24;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;font-weight:800;text-align:center;padding:6px 2px;outline:none}
.roll:focus{border-color:#fbbf24}
.name{flex:1;min-width:0;background:transparent;border:none;color:#f0f0f5;font-family:inherit;font-size:14px;outline:none;padding:6px 0}
.del{width:26px;height:26px;background:transparent;border:none;color:#5a5a6e;cursor:pointer;padding:0;border-radius:6px;display:inline-flex;align-items:center;justify-content:center}
.del:active{color:#f87171;background:rgba(248,113,113,.12)}
.del svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.4}
.foot{display:grid;grid-template-columns:2fr 1fr;gap:8px}
.foot button{padding:14px;border-radius:10px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #2a2a32;letter-spacing:.5px}
.foot .primary{background:rgba(248,113,113,.15);border-color:rgba(248,113,113,.4);color:#f87171}
.foot .primary:active{transform:scale(.96);background:#f87171;color:#0a0a0f}
.foot .ghost{background:transparent;color:#5a5a6e}
.foot .ghost:active{color:#f0f0f5;border-color:#4a4a5a}
</style>
</head>
<body>
<h1><span class="ico"><svg viewBox="0 0 24 24"><path d="M14.5 17.5L3 6V3h3l11.5 11.5"/><path d="M13 7.5l3.5-3.5L21 8.5l-3.5 3.5"/><path d="M4 14l2-2"/></svg></span>Iniciativa<button class="add" onclick="add()"><svg viewBox="0 0 24 24" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></h1>
<ol id="list"></ol>
<div class="foot"><button class="primary" onclick="nxt()">Próximo turno</button><button class="ghost" onclick="clr()">Limpar</button></div>
<script>
let L=[],T=0;
try{const j=JSON.parse(localStorage.getItem('wg-init')||'{}');if(Array.isArray(j.l))L=j.l;T=j.t||0}catch(e){}
function sv(){try{localStorage.setItem('wg-init',JSON.stringify({l:L,t:T}))}catch(e){}}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}
function render(){
  document.getElementById('list').innerHTML=L.map((x,i)=>`<li class="${i===T?'active':''}"><input class="roll" type="number" value="${x.r}" onchange="L[${i}].r=+this.value;sort()"><input class="name" value="${esc(x.n)}" placeholder="Nome" onchange="L[${i}].n=this.value;sv()"><button class="del" onclick="rm(${i})"><svg viewBox="0 0 24 24" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></li>`).join('');
}
function add(){L.push({n:'',r:1+Math.floor(Math.random()*20)});sort();if(navigator.vibrate)navigator.vibrate(15)}
function sort(){L.sort((a,b)=>b.r-a.r);render();sv()}
function nxt(){if(!L.length)return;T=(T+1)%L.length;render();sv();if(navigator.vibrate)navigator.vibrate(25)}
function rm(i){L.splice(i,1);if(T>=L.length)T=0;render();sv()}
function clr(){if(!L.length)return;if(confirm('Limpar iniciativa?')){L=[];T=0;render();sv()}}
render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js').catch(()=>{});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>Progressão</title>
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../icons/icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#09090b;color:#f0f0f5;font-family:'Inter',system-ui,sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));gap:18px}
h1{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a0a0b0;display:flex;align-items:center;gap:8px}
.ico{width:22px;height:22px;border-radius:7px;background:rgba(251,191,36,.12);color:#fbbf24;display:flex;align-items:center;justify-content:center}
.ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#131316;border:1px solid #2a2a32;border-radius:16px;padding:24px}
.ring{position:relative;width:min(220px,60vw);aspect-ratio:1;display:flex;align-items:center;justify-content:center}
.ring svg{position:absolute;inset:0;width:100%;height:100%}
.ring svg circle:last-child{transition:stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)}
.center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.n{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:clamp(44px,14vw,64px);font-weight:800;color:#fbbf24;line-height:1;letter-spacing:-2px}
.l{font-size:10px;color:#5a5a6e;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.meta{display:flex;justify-content:space-between;width:100%;padding-top:14px;border-top:1px solid #2a2a32;font-size:12px;font-weight:600;color:#5a5a6e}
.meta span:first-child{color:#fbbf24}
.inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inputs label{display:flex;flex-direction:column;gap:4px;font-size:10px;color:#5a5a6e;letter-spacing:1px;text-transform:uppercase;font-weight:600}
.inputs input{background:#18181c;border:1px solid #2a2a32;border-radius:8px;color:#fff;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:15px;font-weight:700;padding:10px;outline:none;text-align:center}
.inputs input:focus{border-color:#fbbf24}
button{padding:12px;background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.4);border-radius:10px;color:#fbbf24;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px}
button:active{transform:scale(.96)}
</style>
</head>
<body>
<h1><span class="ico"><svg viewBox="0 0 24 24"><polygon points="12 2 15 8.5 22 9.3 17 14 18.2 21 12 17.8 5.8 21 7 14 2 9.3 9 8.5 12 2"/></svg></span>Progressão</h1>
<div class="main">
<div class="ring"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" stroke="#18181c" stroke-width="10" fill="none"/><circle cx="60" cy="60" r="52" stroke="#fbbf24" stroke-width="10" fill="none" stroke-linecap="round" id="arc" stroke-dasharray="326.73" stroke-dashoffset="326.73" transform="rotate(-90 60 60)"/></svg><div class="center"><span class="n" id="lv">0</span><small class="l">Nível</small></div></div>
<div class="meta"><span id="xp">0 XP</span><span id="nx">0 pra próximo</span></div>
</div>
<div class="inputs"><label>Nível<input id="i-lv" type="number" min="0" value="0"></label><label>XP<input id="i-xp" type="number" min="0" value="0"></label><label>XP pro próximo<input id="i-nx" type="number" min="1" value="1000"></label><button onclick="upd()">Salvar</button></div>
<script>
let d={lv:0,xp:0,nx:1000};
try{Object.assign(d,JSON.parse(localStorage.getItem('wg-level')||'{}'))}catch(e){}
function render(){
  document.getElementById('lv').textContent=d.lv;
  document.getElementById('xp').textContent=d.xp.toLocaleString()+' XP';
  document.getElementById('nx').textContent=Math.max(0,d.nx-d.xp).toLocaleString()+' pra próximo';
  const C=2*Math.PI*52,p=Math.max(0,Math.min(1,d.xp/Math.max(1,d.nx)));
  document.getElementById('arc').style.strokeDashoffset=C*(1-p);
  document.getElementById('i-lv').value=d.lv;document.getElementById('i-xp').value=d.xp;document.getElementById('i-nx').value=d.nx;
}
function upd(){d.lv=Math.max(0,+document.getElementById('i-lv').value||0);d.xp=Math.max(0,+document.getElementById('i-xp').value||0);d.nx=Math.max(1,+document.getElementById('i-nx').value||1);try{localStorage.setItem('wg-level',JSON.stringify(d))}catch(e){}render();if(navigator.vibrate)navigator.vibrate(20)}
render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js').catch(()=>{});
</script>
</body>
</html>

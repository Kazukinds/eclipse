<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>Notas</title>
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../icons/icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#09090b;color:#f0f0f5;font-family:'Inter',system-ui,sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding:max(16px,env(safe-area-inset-top)) 16px max(16px,env(safe-area-inset-bottom));gap:12px}
h1{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a0a0b0;display:flex;align-items:center;gap:8px}
.ico{width:22px;height:22px;border-radius:7px;background:rgba(251,146,60,.12);color:#fb923c;display:flex;align-items:center;justify-content:center}
.ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.saved{margin-left:auto;font-size:10px;color:#c8f542;font-weight:600;opacity:0;transition:opacity .2s;letter-spacing:.5px}
.saved.on{opacity:1}
textarea{flex:1;background:#131316;border:1px solid #2a2a32;border-radius:14px;padding:16px;color:#f0f0f5;font-family:inherit;font-size:14px;line-height:1.55;resize:none;outline:none;transition:border-color .15s}
textarea:focus{border-color:rgba(251,146,60,.5)}
.foot{display:flex;gap:8px;font-size:10px;color:#5a5a6e;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.foot span{flex:1}
button{background:transparent;border:1px solid #2a2a32;border-radius:8px;color:#5a5a6e;padding:6px 12px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
button:active{transform:scale(.96);color:#fb923c;border-color:#fb923c}
</style>
</head>
<body>
<h1><span class="ico"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>Notas<span class="saved" id="sv">Salvo</span></h1>
<textarea id="a" placeholder="Anote ideias, resumos de sessão, nomes de NPCs, loot..."></textarea>
<div class="foot"><span id="ct">0 chars</span><button onclick="clr()">Limpar</button></div>
<script>
const a=document.getElementById('a');
try{a.value=localStorage.getItem('wg-notes')||''}catch(e){}
function count(){document.getElementById('ct').textContent=a.value.length+' chars'}
let t;
a.addEventListener('input',()=>{count();clearTimeout(t);t=setTimeout(()=>{try{localStorage.setItem('wg-notes',a.value)}catch(e){}const s=document.getElementById('sv');s.classList.add('on');clearTimeout(t._s);t._s=setTimeout(()=>s.classList.remove('on'),1200)},200)});
function clr(){if(confirm('Limpar todas as notas?')){a.value='';localStorage.removeItem('wg-notes');count()}}
count();
if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js').catch(()=>{});
</script>
</body>
</html>

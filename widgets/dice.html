<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>Dados</title>
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../icons/icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#09090b;color:#f0f0f5;font-family:'Inter',system-ui,sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));gap:18px}
h1{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a0a0b0;display:flex;align-items:center;gap:8px}
.ico{width:22px;height:22px;border-radius:7px;background:rgba(200,245,66,.12);color:#c8f542;display:flex;align-items:center;justify-content:center}
.ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.result{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#131316;border:1px solid #2a2a32;border-radius:16px;padding:20px}
.num{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:clamp(64px,22vw,140px);font-weight:800;color:#c8f542;line-height:1;letter-spacing:-4px;text-shadow:0 0 40px rgba(200,245,66,.4)}
.num.roll{animation:pop .45s cubic-bezier(.34,1.5,.64,1)}
@keyframes pop{0%{transform:scale(.4) rotate(-15deg);opacity:.2}60%{transform:scale(1.2) rotate(4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.meta{font-size:12px;color:#5a5a6e;letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
.btns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
button{padding:18px 0;background:#18181c;border:1px solid #2a2a32;border-radius:12px;color:#a0a0b0;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s,background .15s,color .15s,border-color .15s}
button:active{transform:scale(.95);background:rgba(200,245,66,.1);border-color:#c8f542;color:#c8f542}
button.d20{grid-column:span 3;background:rgba(200,245,66,.1);border-color:rgba(163,199,54,.4);color:#c8f542;font-size:18px}
button.d20:active{background:#c8f542;color:#0a0a0f}
</style>
</head>
<body>
<h1><span class="ico"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><circle cx="16" cy="16" r="1.2" fill="currentColor"/><circle cx="16" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="16" r="1.2" fill="currentColor"/></svg></span>Dados</h1>
<div class="result"><div class="num" id="n">—</div><div class="meta" id="m">Toque um dado</div></div>
<div class="btns">
<button onclick="roll(4)">d4</button><button onclick="roll(6)">d6</button><button onclick="roll(8)">d8</button>
<button onclick="roll(10)">d10</button><button onclick="roll(12)">d12</button><button class="d20" onclick="roll(20)">d20</button>
</div>
<script>
function roll(s){const r=1+Math.floor(Math.random()*s);const n=document.getElementById('n');n.textContent=r;n.classList.remove('roll');void n.offsetWidth;n.classList.add('roll');document.getElementById('m').textContent=`d${s} · ${new Date().toLocaleTimeString().slice(0,5)}`;if(navigator.vibrate)navigator.vibrate(30)}
if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js').catch(()=>{});
</script>
</body>
</html>

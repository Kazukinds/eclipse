<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<title>Sessão</title>
<link rel="manifest" href="../manifest.webmanifest">
<link rel="icon" href="../icons/icon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#09090b;color:#f0f0f5;font-family:'Inter',system-ui,sans-serif;overscroll-behavior:none}
body{display:flex;flex-direction:column;padding:max(20px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom));gap:18px}
h1{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#a0a0b0;display:flex;align-items:center;gap:8px}
.ico{width:22px;height:22px;border-radius:7px;background:rgba(34,211,238,.12);color:#22d3ee;display:flex;align-items:center;justify-content:center}
.ico svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#131316;border:1px solid #2a2a32;border-radius:16px;padding:20px}
.display{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:clamp(40px,14vw,80px);font-weight:800;color:#fff;letter-spacing:-2px;line-height:1}
.label{font-size:12px;color:#5a5a6e;letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.label.on{color:#22d3ee}
.btns{display:grid;grid-template-columns:2fr 1fr;gap:10px}
button{padding:16px;border-radius:12px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid #2a2a32;transition:transform .1s}
button:active{transform:scale(.96)}
#t{background:rgba(34,211,238,.15);border-color:rgba(34,211,238,.4);color:#22d3ee}
#t.running{background:rgba(251,146,60,.15);border-color:rgba(251,146,60,.4);color:#fb923c}
#r{background:transparent;color:#a0a0b0}
button svg{width:14px;height:14px}
</style>
</head>
<body>
<h1><span class="ico"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg></span>Sessão</h1>
<div class="main"><div class="display" id="d">00:00:00</div><div class="label" id="l">Parado</div></div>
<div class="btns"><button id="t" onclick="tg()"><svg viewBox="0 0 24 24" fill="currentColor" id="ti"><polygon points="5 3 19 12 5 21 5 3"/></svg><span id="tl">Iniciar</span></button><button id="r" onclick="rs()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>Zerar</button></div>
<script>
let s={r:false,st:0,el:0,iv:null};
try{const j=JSON.parse(localStorage.getItem('wg-timer')||'{}');if(j.el)s.el=j.el;if(j.r&&j.st){s.r=true;s.st=j.st}}catch(e){}
function fmt(ms){const sec=Math.max(0,Math.floor(ms/1000)),h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),ss=sec%60;return[h,m,ss].map(n=>String(n).padStart(2,'0')).join(':')}
function tick(){document.getElementById('d').textContent=fmt(s.el+(s.r?Date.now()-s.st:0))}
function sv(){try{localStorage.setItem('wg-timer',JSON.stringify(s))}catch(e){}}
function tg(){const b=document.getElementById('t'),l=document.getElementById('l'),tl=document.getElementById('tl'),ti=document.getElementById('ti');
if(s.r){s.el+=Date.now()-s.st;s.r=false;clearInterval(s.iv);b.classList.remove('running');tl.textContent='Retomar';ti.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';l.textContent='Pausado';l.classList.remove('on')}
else{s.st=Date.now();s.r=true;s.iv=setInterval(tick,1000);b.classList.add('running');tl.textContent='Pausar';ti.innerHTML='<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';l.textContent='Em andamento';l.classList.add('on')}sv()}
function rs(){clearInterval(s.iv);s={r:false,st:0,el:0,iv:null};document.getElementById('d').textContent='00:00:00';document.getElementById('l').textContent='Parado';document.getElementById('l').classList.remove('on');document.getElementById('t').classList.remove('running');document.getElementById('tl').textContent='Iniciar';document.getElementById('ti').innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';sv()}
if(s.r){s.iv=setInterval(tick,1000);document.getElementById('t').classList.add('running');document.getElementById('tl').textContent='Pausar';document.getElementById('ti').innerHTML='<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';document.getElementById('l').textContent='Em andamento';document.getElementById('l').classList.add('on')}
tick();
if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js').catch(()=>{});
</script>
</body>
</html>
